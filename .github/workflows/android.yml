name: Android CI

on:
  push:
    branches: [ "main", "DG6.7" ]
  pull_request:
    branches: [ "main" ]

env:
  # Opt into Node.js 24 to fix the deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        # Most modern Android apps now require JDK 17
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      # Using 'assembleDebug' is enough; 'build' is redundant and takes longer
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: dgv6-debug-apk
        # Using wildcards helps if the filename isn't exactly 'app-debug.apk'
        path: app/build/outputs/apk/debug/*.apk
